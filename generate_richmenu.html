<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>リッチメニュー PNG出力用</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: #ccc;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px;
    gap: 20px;
  }
  h3 { color: #333; margin-bottom: 8px; }
  p.note { color: #666; font-size: 14px; margin-bottom: 20px; }

  /* 実寸: 2500x1686 → ブラウザ表示は50%縮小 */
  .menu-wrapper {
    width: 1250px;
    height: 843px;
    position: relative;
  }
  .menu {
    width: 2500px;
    height: 1686px;
    transform: scale(0.5);
    transform-origin: top left;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    background: #FFFFFF;
  }
  .cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-right: 3px solid #EBEBEB;
    border-bottom: 3px solid #EBEBEB;
    background: #FFFFFF;
  }
  .cell:nth-child(3n) { border-right: none; }
  .cell:nth-child(n+4) { border-bottom: none; }

  .icon-box {
    width: 180px;
    height: 180px;
    border-radius: 44px;
    background: #E8F5E9;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
  }
  .icon-box svg {
    width: 96px;
    height: 96px;
    stroke: #06C755;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .cell-title {
    font-size: 88px;
    font-weight: 800;
    color: #222222;
    margin-bottom: 20px;
    letter-spacing: 0.03em;
  }
  .cell-desc {
    font-size: 48px;
    color: #999999;
    font-weight: 400;
  }

  button {
    margin-top: 20px;
    padding: 16px 40px;
    font-size: 18px;
    background: #06C755;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
  }
  button:hover { background: #05b34d; }
  #status { margin-top: 10px; color: #666; font-size: 14px; }
</style>
</head>
<body>

<h3>リッチメニュー ライト版（2500x1686px）</h3>
<p class="note">下のボタンでPNG保存できます</p>

<div class="menu-wrapper">
  <div class="menu" id="richmenu">
    <!-- Row 1 -->
    <div class="cell">
      <div class="icon-box">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M3 18l5-5 3 3 4-5 6 7"/></svg>
      </div>
      <div class="cell-title">レシート</div>
      <div class="cell-desc">撮影して送る</div>
    </div>
    <div class="cell">
      <div class="icon-box">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>
      </div>
      <div class="cell-title">請求書</div>
      <div class="cell-desc">作成・送付</div>
    </div>
    <div class="cell">
      <div class="icon-box">
        <svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/><circle cx="12" cy="12" r="9"/></svg>
      </div>
      <div class="cell-title">入金記録</div>
      <div class="cell-desc">売上を記録</div>
    </div>
    <!-- Row 2 -->
    <div class="cell">
      <div class="icon-box">
        <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l4-6 4 4 5-7"/></svg>
      </div>
      <div class="cell-title">今月のまとめ</div>
      <div class="cell-desc">経費・売上を確認</div>
    </div>
    <div class="cell">
      <div class="icon-box">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
      </div>
      <div class="cell-title">仕訳履歴</div>
      <div class="cell-desc">最近の取引</div>
    </div>
    <div class="cell">
      <div class="icon-box">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      </div>
      <div class="cell-title">経理に質問</div>
      <div class="cell-desc">何でも聞いて</div>
    </div>
  </div>
</div>

<button onclick="exportPNG()">PNG保存</button>
<div id="status"></div>

<script>
async function exportPNG() {
  const status = document.getElementById('status');
  status.textContent = '生成中...';

  const el = document.getElementById('richmenu');
  // Reset transform for capture
  el.style.transform = 'none';
  el.style.position = 'fixed';
  el.style.top = '0';
  el.style.left = '0';
  el.style.zIndex = '9999';

  // Use html2canvas via CDN
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  script.onload = async () => {
    try {
      const canvas = await html2canvas(el, {
        width: 2500,
        height: 1686,
        scale: 1,
        backgroundColor: '#FFFFFF',
      });
      // Restore
      el.style.transform = 'scale(0.5)';
      el.style.position = '';
      el.style.top = '';
      el.style.left = '';
      el.style.zIndex = '';

      const link = document.createElement('a');
      link.download = 'richmenu6_light.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      status.textContent = 'richmenu6_light.png を保存しました';
    } catch(e) {
      status.textContent = 'エラー: ' + e.message;
      el.style.transform = 'scale(0.5)';
      el.style.position = '';
      el.style.top = '';
      el.style.left = '';
      el.style.zIndex = '';
    }
  };
  document.head.appendChild(script);
}
</script>

</body>
</html>
